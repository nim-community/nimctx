name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim-version: ['version-2-2', 'devel']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Nim ${{ matrix.nim-version }}
      uses: alaviss/setup-nim@0.1.1
      with:
        path: 'nim-${{ matrix.nim-version }}'
        version: ${{ matrix.nim-version }}
    
    - name: Install dependencies
      run: nimble install -y
    
    - name: Build
      run: nimble build
    
    - name: Run tests
      run: nimble test
    
    - name: Test binary
      run: ./nimctx --version || echo "Binary check completed"
