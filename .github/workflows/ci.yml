name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    container: nimlang/nim:2.2.0
    strategy:
      matrix:
        nim-version: ['2.2.0', '2.2.2']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Nim ${{ matrix.nim-version }}
      run: |
        if [ "${{ matrix.nim-version }}" != "2.2.0" ]; then
          choosenim ${{ matrix.nim-version }}
        fi
        nim --version
    
    - name: Install dependencies
      run: nimble install -y
    
    - name: Build
      run: nimble build
    
    - name: Run tests
      run: nimble test
    
    - name: Test binary
      run: ./nimctx --version || echo "Binary check completed"

  test-stable:
    runs-on: ubuntu-latest
    container: nimlang/nim:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Nim version
      run: nim --version
    
    - name: Install dependencies
      run: nimble install -y
    
    - name: Build
      run: nimble build
    
    - name: Run tests
      run: nimble test

  lint:
    runs-on: ubuntu-latest
    container: nimlang/nim:2.2.0
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Static analysis
      run: nim check src/nimctx.nim
